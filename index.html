<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Golf Pace Tracker</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 20px; background: #f0f4f0; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); display: inline-block; width: 100%; max-width: 400px; }
        select { padding: 10px; margin: 10px 0; width: 85%; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; font-size: 1em; }
        input[type="text"], input[type="number"] { padding: 10px; margin: 10px 0; width: 85%; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; font-size: 1em; }
        button { background: #2e7d32; color: white; border: none; padding: 12px 20px; border-radius: 5px; cursor: pointer; font-weight: bold; width: 85%; margin-top: 10px; font-size: 1.1em; }
        #result { margin-top: 20px; font-size: 1.4em; color: #1b5e20; font-weight: bold; }
        .sub-text { font-size: 0.9em; color: #666; margin-top: 5px; }
        .label-text { font-weight: bold; display: block; margin-top: 10px; text-align: left; padding-left: 8%; }
        .settings-btn { background: #666; width: auto; margin-left: auto; margin-right: auto; display: block; margin-top: 20px; }
        .page { display: none; }
        .page.active { display: block; }
        .settings-header { display: flex; justify-content: space-between; align-items: center; }
        .back-btn { background: #666; padding: 10px 15px; font-size: 1em; width: auto; margin-top: 0; }
        .save-btn { background: #2e7d32; }
    </style>
</head>
<body>

<div class="card">
    <div id="mainPage" class="page active">
        <h2 id="appTitle">Laurel Hill Pace Tracker</h2>
        
        <span class="label-text">Starting Hole:</span>
        <select id="startHole">
            <option value="1">Front 9 (Hole 1)</option>
            <option value="10">Back 9 (Hole 10)</option>
        </select>

        <span class="label-text">Select Tee Time:</span>
        <select id="teeTime">
            <!-- This will be populated dynamically -->
        </select>
        
        <span class="label-text">Target Round Length:</span>
        <select id="pace">
            <option value="13.33">4 Hours (Fast)</option>
            <option value="14">4h 12m (Average)</option>
            <option value="15" selected>4.5 Hours (Standard)</option>
            <option value="16">4h 48m (Slow)</option>
        </select>

        <button onclick="calculateHole()">Check My Position</button>

        <div id="result"></div>
        <div id="elapsed" class="sub-text"></div>
        
        <button class="settings-btn" onclick="goToSettings()">⚙️ Settings</button>
    </div>

    <div id="settingsPage" class="page">
        <div class="settings-header">
            <h2>Settings</h2>
            <button class="back-btn" onclick="goToMain()">Back</button>
        </div>
        
        <span class="label-text">Golf Course Name:</span>
        <input type="text" id="golfCourseName" maxlength="25" placeholder="Enter course name">
        <div class="sub-text">Max 25 characters</div>

        <span class="label-text">Tee Time Increment (minutes):</span>
        <select id="teeIncrement">
            <option value="1">1</option>
            <option value="2">2</option>
            <option value="3">3</option>
            <option value="4">4</option>
            <option value="5">5</option>
            <option value="6">6</option>
            <option value="7" selected>7</option>
            <option value="8">8</option>
            <option value="9">9</option>
            <option value="10">10</option>
        </select>
        
        <button class="save-btn" onclick="saveSettings()">Save Settings</button>
    </div>
</div>

<script>
// Load settings from localStorage on page load
window.addEventListener('DOMContentLoaded', function() {
    const savedCourseName = localStorage.getItem('golfCourseName') || 'Laurel Hill';
    const savedIncrement = localStorage.getItem('teeIncrement') || '7';
    
    document.getElementById('golfCourseName').value = savedCourseName;
    document.getElementById('teeIncrement').value = savedIncrement;
    updateAppTitle(savedCourseName);
    generateTeeTimeOptions(parseInt(savedIncrement));
});

function goToSettings() {
    document.getElementById('mainPage').classList.remove('active');
    document.getElementById('settingsPage').classList.add('active');
}

function goToMain() {
    document.getElementById('settingsPage').classList.remove('active');
    document.getElementById('mainPage').classList.add('active');
}

function saveSettings() {
    const courseName = document.getElementById('golfCourseName').value.trim();
    const increment = document.getElementById('teeIncrement').value;
    
    if (courseName === '') {
        alert('Please enter a golf course name');
        return;
    }
    
    localStorage.setItem('golfCourseName', courseName);
    localStorage.setItem('teeIncrement', increment);
    updateAppTitle(courseName);
    generateTeeTimeOptions(parseInt(increment));
    goToMain();
}

function updateAppTitle(courseName) {
    document.getElementById('appTitle').textContent = courseName + ' Pace Tracker';
}

function generateTeeTimeOptions(increment) {
    const teeTimeSelect = document.getElementById('teeTime');
    teeTimeSelect.innerHTML = '';
    
    const startHour = 7;
    const endHour = 19;
    const startMinute = increment;
    
    let currentHour = startHour;
    let currentMinute = startMinute;
    
    while (currentHour < endHour || (currentHour === endHour && currentMinute === 0)) {
        const displayHour = currentHour > 12 ? currentHour - 12 : currentHour;
        const period = currentHour >= 12 ? 'PM' : 'AM';
        const timeValue = `${String(currentHour).padStart(2, '0')}:${String(currentMinute).padStart(2, '0')}`;
        const timeDisplay = `${String(displayHour).padStart(2, '0')}:${String(currentMinute).padStart(2, '0')} ${period}`;
        
        const option = document.createElement('option');
        option.value = timeValue;
        option.text = timeDisplay;
        teeTimeSelect.appendChild(option);
        
        currentMinute += increment;
        if (currentMinute >= 60) {
            currentMinute -= 60;
            currentHour += 1;
        }
    }
}

function calculateHole() {
    const teeTimeValue = document.getElementById('teeTime').value;
    const startHole = parseInt(document.getElementById('startHole').value);
    const minsPerHole = parseFloat(document.getElementById('pace').value);
    
    const now = new Date();
    const [hours, minutes] = teeTimeValue.split(':');
    const teeTime = new Date();
    teeTime.setHours(parseInt(hours), parseInt(minutes), 0);

    let elapsedMins = Math.floor((now - teeTime) / 60000);

    if (elapsedMins < 0) {
        document.getElementById('result').innerHTML = "You haven't started yet!";
        document.getElementById('elapsed').innerHTML = "";
        return;
    }

    let holesPlayed = Math.floor(elapsedMins / minsPerHole);
    let currentHole;

    if (holesPlayed >= 18) {
        document.getElementById('result').innerHTML = "Round Finished! ??";
        document.getElementById('elapsed').innerHTML = `Total time: ${elapsedMins} mins`;
        return;
    }

    if (startHole === 1) {
        currentHole = holesPlayed + 1;
    } else {
        currentHole = 10 + holesPlayed;
        if (currentHole > 18) {
            currentHole = currentHole - 18;
        }
    }
    
    document.getElementById('result').innerHTML = `Group should be on Hole #${currentHole}`;
    document.getElementById('elapsed').innerHTML = `Time elapsed: ${elapsedMins} minutes`;
}
</script>

</body>
</html>
