<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Golf Pace Tracker</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 20px; background: #f0f4f0; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); display: inline-block; width: 100%; max-width: 400px; }
        select { padding: 10px; margin: 10px 0; width: 85%; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; font-size: 1em; }
        button { background: #2e7d32; color: white; border: none; padding: 12px 20px; border-radius: 5px; cursor: pointer; font-weight: bold; width: 85%; margin-top: 10px; font-size: 1.1em; }
        #result { margin-top: 20px; font-size: 1.4em; color: #1b5e20; font-weight: bold; }
        .sub-text { font-size: 0.9em; color: #666; margin-top: 5px; }
        .label-text { font-weight: bold; display: block; margin-top: 10px; text-align: left; padding-left: 8%; }
    </style>
</head>
<body>

<div class="card">
    <h2>Laurel Hill Pace Tracker</h2>
    
    <span class="label-text">Starting Hole:</span>
    <select id="startHole">
        <option value="1">Front 9 (Hole 1)</option>
        <option value="10">Back 9 (Hole 10)</option>
    </select>

    <span class="label-text">Select Tee Time:</span>
    <select id="teeTime">
        <option value="07:07">07:07 AM</option>
        <option value="07:17">07:17 AM</option>
        <option value="07:27">07:27 AM</option>
        <option value="07:37">07:37 AM</option>
        <option value="07:47">07:47 AM</option>
        <option value="07:57">07:57 AM</option>
        <option value="08:07">08:07 AM</option>
        <option value="08:17">08:17 AM</option>
        <option value="08:27">08:27 AM</option>
        <option value="08:37">08:37 AM</option>
        <option value="08:47">08:47 AM</option>
        <option value="08:57">08:57 AM</option>
        <option value="09:07">09:07 AM</option>
        <option value="09:17">09:17 AM</option>
        <option value="09:27">09:27 AM</option>
        <option value="09:37">09:37 AM</option>
        <option value="09:47">09:47 AM</option>
        <option value="09:57">09:57 AM</option>
        <option value="10:07">10:07 AM</option>
        <option value="10:17">10:17 AM</option>
        <option value="10:27">10:27 AM</option>
        <option value="10:37">10:37 AM</option>
        <option value="10:47">10:47 AM</option>
        <option value="10:57">10:57 AM</option>
        <option value="11:07">11:07 AM</option>
        <option value="11:17">11:17 AM</option>
        <option value="11:27">11:27 AM</option>
        <option value="11:37">11:37 AM</option>
        <option value="11:47">11:47 AM</option>
        <option value="11:57">11:57 AM</option>
        <option value="12:07">12:07 PM</option>
        <option value="12:17">12:17 PM</option>
        <option value="12:27">12:27 PM</option>
        <option value="12:37">12:37 PM</option>
        <option value="12:47">12:47 PM</option>
        <option value="12:57">12:57 PM</option>
        <option value="13:07">01:07 PM</option>
        <option value="13:17">01:17 PM</option>
        <option value="13:27">01:27 PM</option>
        <option value="13:37">01:37 PM</option>
        <option value="13:47">01:47 PM</option>
        <option value="13:57">01:57 PM</option>
        <option value="14:07">02:07 PM</option>
        <option value="14:17">02:17 PM</option>
        <option value="14:27">02:27 PM</option>
        <option value="14:37">02:37 PM</option>
        <option value="14:47">02:47 PM</option>
        <option value="14:57">02:57 PM</option>
        <option value="15:07">03:07 PM</option>
        <option value="15:17">03:17 PM</option>
        <option value="15:27">03:27 PM</option>
        <option value="15:37">03:37 PM</option>
        <option value="15:47">03:47 PM</option>
        <option value="15:57">03:57 PM</option>
        <option value="16:07">04:07 PM</option>
        <option value="16:17">04:17 PM</option>
        <option value="16:27">04:27 PM</option>
        <option value="16:37">04:37 PM</option>
        <option value="16:47">04:47 PM</option>
        <option value="16:57">04:57 PM</option>
        <option value="17:07">05:07 PM</option>
        <option value="17:17">05:17 PM</option>
        <option value="17:27">05:27 PM</option>
        <option value="17:37">05:37 PM</option>
        <option value="17:47">05:47 PM</option>
        <option value="17:57">05:57 PM</option>
        <option value="18:07">06:07 PM</option>
        <option value="18:17">06:17 PM</option>
        <option value="18:27">06:27 PM</option>
        <option value="18:37">06:37 PM</option>
        <option value="18:47">06:47 PM</option>
        <option value="18:57">06:57 PM</option>
        <option value="19:07">07:07 PM</option>
    </select>
    
    <span class="label-text">Target Round Length:</span>
    <select id="pace">
        <option value="13.33">4 Hours (Fast)</option>
        <option value="14">4h 12m (Average)</option>
        <option value="15" selected>4.5 Hours (Standard)</option>
        <option value="16">4h 48m (Slow)</option>
    </select>

    <button onclick="calculateHole()">Check My Position</button>

    <div id="result"></div>
    <div id="elapsed" class="sub-text"></div>
</div>

<script>
function calculateHole() {
    const teeTimeValue = document.getElementById('teeTime').value;
    const startHole = parseInt(document.getElementById('startHole').value);
    const minsPerHole = parseFloat(document.getElementById('pace').value);
    
    const now = new Date();
    const [hours, minutes] = teeTimeValue.split(':');
    const teeTime = new Date();
    teeTime.setHours(parseInt(hours), parseInt(minutes), 0);

    let elapsedMins = Math.floor((now - teeTime) / 60000);

    if (elapsedMins < 0) {
        document.getElementById('result').innerHTML = "You haven't started yet!";
        document.getElementById('elapsed').innerHTML = "";
        return;
    }

    let holesPlayed = Math.floor(elapsedMins / minsPerHole);
    let currentHole;

    if (holesPlayed >= 18) {
        document.getElementById('result').innerHTML = "Round Finished! ??";
        document.getElementById('elapsed').innerHTML = `Total time: ${elapsedMins} mins`;
        return;
    }

    if (startHole === 1) {
        currentHole = holesPlayed + 1;
    } else {
        currentHole = 10 + holesPlayed;
        if (currentHole > 18) {
            currentHole = currentHole - 18;
        }
    }
    
    document.getElementById('result').innerHTML = `Group should be on Hole #${currentHole}`;
    document.getElementById('elapsed').innerHTML = `Time elapsed: ${elapsedMins} minutes`;
}
</script>

</body>
</html>
